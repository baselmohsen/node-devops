apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-app

spec:
  replicas: 5

  selector:
    matchLabels:
      app: node-app

  template:
    metadata:
      labels:
        app: node-app

    spec:
      containers:
      - name: node-app
        image: baselmohsen/node-app:81bfa2d629dea8a9809c96cae25c323a50f34167
        ports:
        - containerPort: 3000